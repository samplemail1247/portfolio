<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temp Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <div class="card">
    <h2>Enter The Chat</h2>
    <input id="usernameInput" placeholder="Enter your name" />
    <br>
    <button onclick="joinChat()">Join Chat Room</button>
    <br><br>
    <p><i>You are entering a temporary chat room, do not reload this page.</i></p>
  </div>
</div>

<div id="chat" style="display:none;">
  <div class="chat-container">
    <div class="chat-header">Temp Chat - Please send a message to start the conversation</div>

    <div id="messages"></div>

    <div class="input-area">
      <input id="messageInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
