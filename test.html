<!DOCTYPE html>
<html>
<head>
  <title>DB Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Insert User</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button id="insertBtn">Insert</button>

<p id="result"></p>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // ✅ Create Supabase client ONCE
  const supabaseClient = window.supabase.createClient(
    "https://kymifcsiobnukgkreckd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5bWlmY3Npb2JudWtna3JlY2tkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTQ1NjgsImV4cCI6MjA5MTg5MDU2OH0.UVLwpoHjo8X9ansWXrQhWyzEDuhhKJ4jvZdItbfW6ok"
  );

  // ✅ Attach event instead of inline onclick
  document.getElementById("insertBtn").addEventListener("click", insertUser);

  async function insertUser() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const result = document.getElementById("result");

    // ✅ Basic validation
    if (!email || !password) {
      result.innerText = "⚠️ Enter email and password";
      return;
    }

    const { data, error } = await supabaseClient
      .from("users")
      .insert([{ email, password }]);

    if (error) {
      result.innerText = "❌ " + error.message;
      console.error(error);
    } else {
      result.innerText = "✅ User inserted!";
      console.log(data);
    }
  }

});
</script>

</body>
</html>
